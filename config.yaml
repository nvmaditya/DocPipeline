extraction:
    scanned_threshold: 50
    ocr_engine: none
    ocr_language: eng

chunking:
    strategy: recursive
    chunk_size: 512
    chunk_overlap: 64
    semantic_threshold: 0.5

embedding:
    backend: local
    model: BAAI/bge-large-en-v1.5
    batch_size: 32
    device: cpu
    normalize: true
    github_endpoint: https://models.github.ai/inference
    github_token_env: GITHUB_TOKEN

faiss:
    index_type: flat
    hnsw_m: 32
    hnsw_ef_construction: 200
    hnsw_ef_search: 64

store:
    faiss_path: store/faiss.index
    sqlite_path: store/metadata.db

query:
    top_k: 5
    score_threshold: 0.0
    use_llm: false
    llm_backend: github
    llm_model: openai/gpt-5
    github_endpoint: https://models.github.ai/inference
    github_token_env: GITHUB_TOKEN
