extraction:
    scanned_threshold: 50
    ocr_engine: none
    ocr_language: eng

chunking:
    strategy: recursive
    chunk_size: 380
    chunk_overlap: 50
    semantic_threshold: 0.5

embedding:
    backend: github
    model: bge-large
    batch_size: 64
    device: cpu
    normalize: true
    github_endpoint: http://localhost:11434/v1
    github_token_env: OLLAMA_API_KEY

faiss:
    index_type: flat
    hnsw_m: 32
    hnsw_ef_construction: 200
    hnsw_ef_search: 64

store:
    faiss_path: store/faiss.index
    sqlite_path: store/metadata.db

query:
    top_k: 5
    score_threshold: 0.0
    use_llm: true
    llm_backend: ollama
    llm_model: phi3
