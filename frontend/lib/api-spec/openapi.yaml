openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Document Intelligence Workspace API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: documents
    description: Document management operations
  - name: search
    description: Semantic search operations
  - name: ask
    description: Q&A over documents
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List all documents
      description: Returns all documents for the current user
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentList"

  /documents/{documentId}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get document details
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/upload:
    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Upload a document
      description: Upload and ingest a document file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload
      responses:
        "201":
          description: Document uploaded and queued for processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "400":
          description: Invalid file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /search:
    post:
      operationId: searchDocuments
      tags: [search]
      summary: Semantic search over documents
      description: Search documents by semantic meaning
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"

  /ask:
    post:
      operationId: askQuestion
      tags: [ask]
      summary: Ask a question over documents
      description: Ask a natural language question and get a grounded answer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AskRequest"
      responses:
        "200":
          description: Answer with sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AskResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    DeleteResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    Document:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        fileType:
          type: string
        fileSize:
          type: integer
        status:
          type: string
          enum: [pending, processing, ready, error]
        chunkCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - fileType
        - fileSize
        - status
        - chunkCount
        - createdAt
        - updatedAt

    DocumentList:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/Document"
        total:
          type: integer
      required:
        - documents
        - total

    SearchRequest:
      type: object
      properties:
        query:
          type: string
          description: The search query
        limit:
          type: integer
          default: 10
          description: Maximum number of results
        documentIds:
          type: array
          items:
            type: string
          description: Optional filter to specific documents
      required:
        - query

    SearchResult:
      type: object
      properties:
        documentId:
          type: string
        documentName:
          type: string
        content:
          type: string
        score:
          type: number
        chunkIndex:
          type: integer
      required:
        - documentId
        - documentName
        - content
        - score
        - chunkIndex

    SearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
        query:
          type: string
        total:
          type: integer
      required:
        - results
        - query
        - total

    AskRequest:
      type: object
      properties:
        question:
          type: string
          description: The question to answer
        documentIds:
          type: array
          items:
            type: string
          description: Optional filter to specific documents
      required:
        - question

    AskSource:
      type: object
      properties:
        documentId:
          type: string
        documentName:
          type: string
        content:
          type: string
        score:
          type: number
      required:
        - documentId
        - documentName
        - content
        - score

    AskResponse:
      type: object
      properties:
        answer:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/AskSource"
        question:
          type: string
      required:
        - answer
        - sources
        - question
